<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen">
    <div class="bg-pink-50 p-10 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-blue-900 mb-2">ScholarAI</h1>
        <p class="text-gray-500 mb-8 text-sm">Welcome back! Please login.</p>
        {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded-xl mb-4 text-sm">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
        <form action="/login" method="POST" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-4 text-gray-400"></i>
                <input type="email" name="email" placeholder="Email Address" required class="w-full pl-12 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
                <input type="password" name="password" placeholder="Password" required class="w-full pl-12 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Log In</button>
        </form>

        <div class="my-6 flex items-center justify-center space-x-2">
            <div class="h-px bg-gray-200 w-full"></div>
            <span class="text-gray-600 text-xs">OR</span>
            <div class="h-px bg-gray-200 w-full"></div>
        </div>

        <a href="{{ url_for('google.login') }}" class="w-full border flex items-center justify-center py-3 rounded-xl hover:bg-gray-50 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 mr-2">
            <span class="text-gray-600 font-medium">Continue with Google</span>
        </a>

        <p class="mt-8 text-sm text-gray-600">Don't have an account? <a href="/signup" class="text-blue-600 font-bold">Sign Up</a></p>
    </div>
</body>
</html>
